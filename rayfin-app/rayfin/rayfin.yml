id: rayfin-app
name: rayfin-app
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    password:
      enabled: false
    allowedRedirectUris:
      - https://<your-rayfin-app>.fabricapps.net
  data:
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
  storage:
    enabled: false
  functions:
    enabled: false
